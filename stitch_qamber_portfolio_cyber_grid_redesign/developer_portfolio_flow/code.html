        .matrix-rain {
            position: fixed;
            top: 0;
            left: 0;

            z-index: 1;
            opacity: 0.3;
        }

        .glitch-avatar {
            position: relative;
            animation: pulse-border 3s infinite alternate;
        }

        .glitch-avatar::before,
        .glitch-avatar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 50%;
            background: inherit;
            opacity: 0.5;
            z-index: -1;
            mix-blend-mode: screen;
        }

        .glitch-avatar::before {
            background-color: rgba(255, 71, 87, 0.5); /* red */
            animation: glitch-anim-1 7s infinite linear alternate-reverse;
        }

        .glitch-avatar::after {
            background-color: rgba(0, 245, 255, 0.5); /* cyan */
            animation: glitch-anim-2 7s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim-1 {
            0% { transform: translate(0) }
            20% { transform: translate(-2px, 2px) }
            40% { transform: translate(-2px, -2px) }
            60% { transform: translate(2px, 2px) }
            80% { transform: translate(2px, -2px) }
            100% { transform: translate(0) }
        }

        @keyframes glitch-anim-2 {
            0% { transform: translate(0) }
            20% { transform: translate(2px, -2px) }
            40% { transform: translate(2px, 2px) }
            60% { transform: translate(-2px, -2px) }
            80% { transform: translate(-2px, 2px) }
            100% { transform: translate(0) }
        }

        @keyframes pulse-border {
            0% { box-shadow: 0 0 10px rgba(0, 245, 255, 0.5); }

<!-- Matrix Rain Script -->
<script>
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const katakana = 'アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズブヅプエェケセテネヘメレゲゼデベペオォコソトノホモヨョロゴゾドボポヴッン';
        const latin = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const nums = '0123456789';
        const alphabet = katakana + latin + nums;

        const fontSize = 16;
        const columns = canvas.width/fontSize;

        const rainDrops = [];

        for( let x = 0; x < columns; x++ ) {
            rainDrops[x] = 1;
        }

        const draw = () => {
            ctx.fillStyle = 'rgba(5, 5, 16, 0.05)'; // Deep navy bg with trailing effect
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#0F0'; // Fallback green
            ctx.fillStyle = '#00f5ff'; // Electric cyan
            ctx.font = fontSize + 'px monospace';

            for(let i = 0; i < rainDrops.length; i++)
            {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                ctx.fillText(text, i*fontSize, rainDrops[i]*fontSize);

                if(rainDrops[i]*fontSize > canvas.height && Math.random() > 0.97){
                    rainDrops[i] = 0;
                }
                rainDrops[i]++;
            }
        };

        setInterval(draw, 50);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
